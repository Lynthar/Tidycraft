# tidycraft.example.toml — strict sample config
#
# 把这份文件复制到你想测试的项目根目录并重命名为 `tidycraft.toml`，
# 下次 Run Analysis 会自动加载（侧边栏运行按钮上会出现一个琥珀色小点
# 提示 "Using custom rules from tidycraft.toml"）。
#
# 注意：out-of-box 的默认规则非常宽松 —— 只有 [naming]（仅 forbidden_chars）
# + [texture.color_space] + duplicate + missing_reference (Unity) 默认开启。
# 这份 sample 故意把所有 family 都打开 + 阈值收紧,方便观察"工具能查出哪些"。
#
# 任何字段都可省略 —— 缺失的字段会回退到默认值（见 docs/analyzer-rules.md）。

[naming]
enabled = true
# Default: [' ', '!', '@', '#', '$', '%', '^', '&', '*', '(', ')', '+', '=']
# （shell-unsafe 标点 + 空格）。这里替换成 Windows 文件系统真正禁止的字符
# 列表 + 空格，方便测试 / 演示。
forbidden_chars = ['<', '>', ':', '"', '|', '?', '*', '/', '\', ' ']
# Default: false. 这里开启，演示中文命名警告。
forbid_chinese = true
# Default: 512. 收紧到 32 让长命名暴露出来。
max_length = 32
# Default: None. 这里强制纹理用 "T_" 前缀。
texture_prefix = "T_"
# Default: None. 强制模型用 "SM_" 前缀（Unreal-style）。
model_prefix = "SM_"
# Default: None. 强制音频用 "A_" 前缀。
audio_prefix = "A_"
# Default: "any". 可选 "any" / "snake_case" / "kebab-case" / "PascalCase" / "camelCase"。
case_style = "snake_case"

[texture]
# Default: false（out-of-box 关闭尺寸 / PoT / file-size 检测）。这里打开。
enabled = true
require_pot = true
# Default: 4096. 收紧到 2048 把 4K 贴图全部点亮。
max_size = 2048
min_size = 4
# Default: false. 打开非正方形警告。
warn_non_square = true
# Default: 10 MB. 收紧到 4 MB。
max_file_size = 4_194_304

# texture.color_space —— 默认 enabled = true（即使 [texture].enabled = false），
# 不需要在这里重新声明（除非要关掉它）。
# [texture.color_space]
# enabled = true

[model]
# Default: false. 这里打开，把多边形 / 材质数预算检测起来。
enabled = true
# Default: 100_000. 收紧到 10_000 让大网格全部触发"超预算"。
max_vertices = 10_000
# Default: 100_000.
max_faces = 10_000
# Default: 10. 收紧到 4 让多材质模型暴露。
max_materials = 4

[audio]
# Default: false. 这里打开。
enabled = true
# Default: [44100, 48000]. 只允许 48 kHz，44.1 kHz 文件全部触发。
allowed_sample_rates = [48_000]
# Default: 30.0 秒。SFX 启发式（文件名含 sfx/sound/effect/hit/click/ui）超过这个时长会警告。
max_sfx_duration = 5.0
# Default: 20 MB.
max_file_size = 10_485_760
# Default: false. 打开 → SFX 立体声会被警告应改单声道。
prefer_mono_for_sfx = true

# 跨资源 PBR set 完整性检查 —— textures 按目录 + 基名分组，
# 含 trigger 通道但缺 required 通道的组报警。详见 docs/analyzer-rules.md。
[pbr_set]
# Default: false. 这里打开，演示 PBR set 缺贴图的告警。
enabled = true
trigger = "basecolor"                    # 该 role 必须存在才检查这个 set
required = ["basecolor", "normal"]       # 缺任意 required role → warning

# Channel role → 后缀别名（大小写不敏感，严格匹配最后一个 `_` 之后的部分）。
[pbr_set.channels]
basecolor = ["BaseColor", "Albedo", "Diffuse", "Color"]
normal    = ["Normal", "Norm"]
roughness = ["Roughness", "Rough"]
metallic  = ["Metallic", "Metal"]
ao        = ["AO", "AmbientOcclusion"]
emissive  = ["Emissive", "Emission"]
height    = ["Height", "Disp"]

# 打包通道：一张 _ORM 同时满足 AO + Roughness + Metallic 三个 role。
[pbr_set.packed]
ORM = ["ao", "roughness", "metallic"]
MRA = ["metallic", "roughness", "ao"]
RMA = ["roughness", "metallic", "ao"]

# Glob 路径排除 —— 匹配中的资源在所有规则之前 drop（per-asset / 重复 /
# 缺失引用 / PBR set 全部生效）。相对于项目根。
[ignore]
patterns = [
    # "ThirdParty/**",
    # "Plugins/**",
    # "Library/**",          # Unity 自动生成
    # "Intermediate/**",     # Unreal 构建缓存
    # "**/_legacy/**",       # 归档目录
]
