name: Feature request
description: Suggest an improvement for Tidycraft
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Tidycraft is focused on game asset scanning, browsing, and QA, so concrete workflows are easiest to discuss.

        Please skim the [Roadmap](https://github.com/Lynthar/Tidycraft#-roadmap) and existing feature requests before opening a new one.

  - type: textarea
    id: problem
    attributes:
      label: Problem you're trying to solve
      description: What workflow is painful today? Please describe the context, not just the feature name.
      placeholder: |
        I'm reviewing 200 textures from a third-party pack and need to identify which are unused.
        Currently I have to grep through .prefab files manually.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach (optional)
      description: If you have a concrete idea for how it should work, describe it here. Sketches and mockups are welcome.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried, or other tools that solve this differently.

  - type: dropdown
    id: scope
    attributes:
      label: Engine / pipeline scope
      description: Which projects would this help?
      multiple: true
      options:
        - Unity
        - Unreal
        - Godot
        - Generic / engine-agnostic
        - Other (describe in proposal)
    validations:
      required: true

  - type: checkboxes
    id: confirms
    attributes:
      label: Before submitting
      options:
        - label: I checked existing issues for a similar request
          required: true
