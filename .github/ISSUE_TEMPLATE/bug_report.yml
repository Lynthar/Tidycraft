name: Bug report
description: Something in Tidycraft is broken or behaves unexpectedly
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this.

        A clear repro saves a lot of back-and-forth: what you did, what you expected, and what happened instead. If Tidycraft crashed, logs or a stack trace are usually more useful than a screenshot.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Steps to reproduce, expected result, and actual result. Short is fine if it is specific.
      placeholder: |
        1. Open project at `~/games/myproject`
        2. Click Run Analysis
        3. Expected: issue list populated
        4. Actual: app freezes for 10s then shows blank panel
    validations:
      required: true

  - type: input
    id: tidycraft-version
    attributes:
      label: Tidycraft version
      description: From the title bar / About menu, or the git commit if you built from source.
      placeholder: "v0.6.1 (or commit abc1234)"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 10
        - Windows 11
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Linux (specify distro below)
    validations:
      required: true

  - type: input
    id: os-detail
    attributes:
      label: OS detail
      description: Specific version / distro / desktop environment if relevant.
      placeholder: "Ubuntu 22.04 / GNOME 42 / Wayland"

  - type: textarea
    id: project-context
    attributes:
      label: Project being scanned
      description: Engine + rough size helps. No need to share the project itself.
      placeholder: "Unity 2022 LTS, ~8000 assets, ~3 GB total"

  - type: textarea
    id: logs
    attributes:
      label: Console / log output
      description: Paste relevant errors from DevTools or the terminal. Please remove API keys, tokens, and private paths before posting.
      render: shell

  - type: checkboxes
    id: confirms
    attributes:
      label: Before submitting
      options:
        - label: I checked existing issues for a matching report
          required: true
        - label: I can reproduce this more than once
          required: false
